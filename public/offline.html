<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eia — Offline</title>
    <!--
      Static file served by the service worker with no CSS pipeline, so token
      values are hardcoded here (same sanctioned exception as manifest.ts).
      Mirrors Earth theme: canvas #0d0c0a, canvas-text rgba(255,255,255,0.85),
      accent #c9a553. Playfair isn't cached offline — Georgia is the serif fallback.
    -->
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d0c0a;
        color: rgba(255, 255, 255, 0.85);
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        text-align: center;
      }
      main {
        padding: 32px;
      }
      img {
        width: 72px;
        height: 72px;
        margin-bottom: 24px;
      }
      h1 {
        font-family: "Playfair Display", Georgia, serif;
        font-style: italic;
        font-weight: 500;
        font-size: 1.5rem;
        margin: 0 0 8px;
      }
      p {
        margin: 0;
        font-size: 0.875rem;
        color: rgba(255, 255, 255, 0.55);
      }
      a {
        display: inline-block;
        margin-top: 24px;
        padding: 10px 20px;
        border-radius: 8px;
        background: #c9a553;
        color: #201808;
        font-size: 0.875rem;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="" />
      <h1>The thread has slipped.</h1>
      <p>Eia needs a connection. Check your network and try again.</p>
      <a href="/dashboard">Retry</a>
    </main>
  </body>
</html>
